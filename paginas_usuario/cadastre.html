<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastre.css">
    <title>Cadastro</title>
</head>
<body>
<div class="tela_cadastro">
         <button class="botao_voltar">←
        <a href="/paginas_usuario/login.html">voltar</a>
    </button><br>
    <h1>CADASTRO</h1>
    
<div class="imagem">
  <img src="../anexos/imagens/image 9.png">
</div>

<div class="campo">
    <input type="text" id="nome" placeholder="Nome completo">
</div>

<div class="campo">
    <input type="text" id="email" placeholder="Email ou Telefone">
</div>


<div class="campo">
    <input type="password" id="senha" placeholder="Senha">
</div>

<div class="campo">
    <input type="password" id="senha" placeholder="Repitir Senha">
</div>


<div class="campo">
    <select id="pergunta_secreta">
        <option selected disabled>Pergunta secreta</option>
        <option>Qual o nome do seu primeiro animal?</option>
        <option>Qual a sua cor favorita?</option>
        <option>Qual o nome da sua mãe?</option>
        <option>Qual sua cidade de nascimento?</option>
    </select>
</div>

<div class="campo">
    <input type="text" id="resposta_secreta" placeholder="Resposta secreta">
</div>

<div class="termos">
    <input type="checkbox" id="termos">
    <label for="termos">Termos</label>
</div>

<div class="acoes">
    <button type="submit">Finalizar cadastro</button>
</div>
    
</div>

<script src="/paginas_usuario/js/cadastre.js"></script>
</body>
</html>
